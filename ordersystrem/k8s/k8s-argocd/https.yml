
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argo-jhm-click-tls
  namespace: argocd
spec:
  secretName: argo-jhm-click-tls
  duration: 2160h0m0s #90day
  renewBefore: 360h0m0s #before 15day
  issuerRef:
    name: my-issuer
    kind: ClusterIssuer
  commonName: argo.jhm-dev.click
  dnsNames:
  - argo.jhm-dev.click