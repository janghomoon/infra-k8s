apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: jhm-dev
spec:
  replicas: 2 #  보장 갯수
  selector:
    matchLabels:
      app: my-nginx # matchLabels은 replicaSet이 관리해야 할 파드를 결정
  template:  # template은 새로운 Pod를 생성할 때 사용하는 템플릿
    metadata:
      labels: # pod   라벨  matchLables 와 labes 는 같아야한다.
        app: my-nginx
    spec: # 선언적 자원
      containers:
        - name: nginx
          image: nginx # nginx #nginx:1.21.6 nginx:1.22.1 nginx:1.24.0
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  namespace: jhm-dev
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: my-nginx